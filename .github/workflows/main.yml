name: Auto Restart and Keep Codespace Active

on:
  schedule:
    - cron: '* * * * *'   
  workflow_dispatch:

jobs:
  restart_codespace:
    runs-on: ubuntu-latest

    steps:
      - name: Install GitHub CLI and jq if not present
        run: |
          if ! command -v gh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y gh jq
          fi

      - name: Authenticate GitHub CLI with Personal Access Token
        run: echo "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" | gh auth login --with-token
       

      - name: Check Codespace Status and Keep Alive
        run: |
          CODESPACE_NAME="legendary-space-journey-xr5xq965qrp939vr5"
          
          STATUS=$(gh codespace list --json name,state | jq -r --arg name "$CODESPACE_NAME" '.[] | select(.name==$name) | .state')
          
          if [ -z "$STATUS" ]; then
            echo "Error: Codespace not found or unable to fetch status."
            exit 1
          fi
          
          echo "Codespace status: $STATUS"
          
          if [ "$STATUS" == "Shutdown" ]; then
            echo "Codespace is offline. Attempting to start it via SSH..."
            gh codespace ssh --codespace "$CODESPACE_NAME" -- echo "Codespace started"
          else
            echo "Codespace is active. Sending keep-alive signal..."
            gh codespace ssh --codespace "$CODESPACE_NAME" -- echo "Keep-alive signal triggered"
          fi
