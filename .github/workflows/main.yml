name: Auto Restart and Keep Codespace Active

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes

permissions:
  contents: read
  codespaces: write   # required to manage codespaces

jobs:
  keep-codespace-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep Codespace Alive
        run: |
          CODESPACE_NAME="legendary-space-journey-xr5xq965qrp939vr5"

          # List all codespaces and filter by name
          STATUS=$(gh codespace list --json name,state -q ".[] | select(.name==\"$CODESPACE_NAME\") | .state")

          if [ -z "$STATUS" ]; then
            echo "Codespace '$CODESPACE_NAME' not found or inaccessible."
            echo "Check that the name is correct and the token has codespace permissions."
            exit 1
          fi

          echo "Current state: $STATUS"

          if [ "$STATUS" == "Shutdown" ] || [ "$STATUS" == "Offline" ]; then
            echo "Starting codespace..."
            gh codespace start --codespace "$CODESPACE_NAME"
          elif [ "$STATUS" == "Available" ] || [ "$STATUS" == "Active" ]; then
            echo "Codespace is running. Sending keep-alive signal..."
            # Execute a no‑op command to reset the inactivity timer
            gh codespace exec --codespace "$CODESPACE_NAME" -- echo "keep-alive"
          else
            echo "Unknown state: $STATUS"
          fi
